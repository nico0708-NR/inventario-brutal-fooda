<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Brutal Food Login</title>
</head>

<body style="
    margin:0;
    background:#111;
    font-family:Arial;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
">

    <div style="
        width:350px;
        text-align:center;
    ">

        <h1 style="
            font-size:55px;
            margin-bottom:40px;
        ">
            🍔 BRUTAL FOOD
        </h1>

        <form method="POST">

            <input
                type="text"
                name="user"
                placeholder="Iniciar sesión"
                required
                style="
                    width:100%;
                    padding:15px;
                    margin-bottom:15px;
                    border:none;
                    border-radius:10px;
                    font-size:18px;
                "
            >

            <input
                type="password"
                name="password"
                placeholder="Contraseña"
                required
                style="
                    width:100%;
                    padding:15px;
                    margin-bottom:20px;
                    border:none;
                    border-radius:10px;
                    font-size:18px;
                "
            >

            <button style="
                background:#ff9800;
                color:white;
                border:none;
                padding:12px 30px;
                border-radius:10px;
                font-size:18px;
                cursor:pointer;
            ">
                Entrar
            </button>

        </form>

    </div>

</body>

</html>
